{% extends "base.html" %}
{% block title %}编辑学生{% endblock %}
{% block content %}
    <div class="card">
        <h1>✏️ 编辑学生信息</h1>

        <form method="POST">
            <div class="form-group">
                <label for="name">姓名：</label>
                <input type="text" id="name" name="name" value="{{ student.name }}" required>
            </div>

            <div class="form-group">
                <label for="age">年龄：</label>
                <input type="number" id="age" name="age" value="{{ student.age }}" min="1" max="150" required>
            </div>

            <div style="margin-top: 20px;">
                <button type="submit" class="btn btn-success">✅ 保存修改</button>
                <a href="/" class="btn btn-primary">← 返回列表</a>
            </div>
        </form>
    </div>

    <div class="card" style="margin-top: 20px; background: #e8f5e9;">
        <h4>📝 代码说明</h4>
        <pre style="background: #f5f5f5; padding: 10px; border-radius: 5px; overflow-x: auto; font-size: 12px;">
# 先查询要修改的记录
student = Student.query.get_or_404(student_id)

# 修改字段值
student.name = request.form.get('name')
student.age = request.form.get('age')

# 提交更新
db.session.commit()
        </pre>
    </div>
{% endblock %}
