{% extends "base.html" %}

{% block title %}注册 - 乳腺癌辅助诊断系统{% endblock %}

{% block content %}
<style>
    .bow-hover {
        display: inline-block;
        cursor: pointer;
        transition: transform 0.3s ease;
    }
    
    .bow-hover:hover {
        animation: bowShake 0.5s ease-in-out;
        transform: scale(1.1);
    }
    
    @keyframes bowShake {
        0%, 100% { transform: scale(1.1) rotate(0deg); }
        10% { transform: scale(1.1) rotate(-10deg); }
        20% { transform: scale(1.1) rotate(10deg); }
        30% { transform: scale(1.1) rotate(-8deg); }
        40% { transform: scale(1.1) rotate(8deg); }
        50% { transform: scale(1.1) rotate(-5deg); }
        60% { transform: scale(1.1) rotate(5deg); }
        70% { transform: scale(1.1) rotate(-3deg); }
        80% { transform: scale(1.1) rotate(3deg); }
        90% { transform: scale(1.1) rotate(-1deg); }
    }
    
    .role-card {
        cursor: pointer;
        transition: all 0.3s ease;
        border: 2px solid transparent;
        border-radius: 12px;
    }
    
    .role-card:hover {
        transform: translateY(-5px) scale(1.02);
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.18);
    }
    
    .role-card.selected {
        border-color: var(--pink-dark);
        background-color: rgba(248, 181, 181, 0.15);
    }
    
    .role-icon-wrapper {
        display: inline-block;
        transition: transform 0.3s ease;
    }
    
    .role-card:hover .role-icon-wrapper {
        transform: scale(1.3);
    }
    
    .role-icon {
        font-size: 3.5rem;
    }
</style>
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5">
        <div class="card overflow-hidden">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <div class="mb-3">
                        <span class="bow-hover" style="font-size: 4rem;">💝</span>
                    </div>
                    <h4 class="text-dark mb-2">用户注册</h4>
                    <p class="text-muted">创建新账户开始使用</p>
                </div>
                {% if error %}
                <div class="alert alert-danger" role="alert">
                    <i class="bi bi-exclamation-circle"></i> {{ error }}
                </div>
                {% endif %}
                <form method="POST" action="/register">
                    <div class="mb-3">
                        <label for="username" class="form-label">
                            <i class="bi bi-person"></i> 用户名
                        </label>
                        <input type="text" class="form-control" id="username" name="username" placeholder="请输入用户名" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">
                            <i class="bi bi-lock"></i> 密码（6位）
                        </label>
                        <input type="password" class="form-control" id="password" name="password" placeholder="请输入6位密码" required minlength="6" maxlength="6">
                    </div>
                    <div class="mb-4">
                        <label for="confirm_password" class="form-label">
                            <i class="bi bi-lock-fill"></i> 确认密码（6位）
                        </label>
                        <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="请再次输入6位密码" required minlength="6" maxlength="6">
                    </div>
                    
                    <!-- 身份选择 -->
                    <div class="mb-4">
                        <label class="form-label d-block mb-3">选择身份</label>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="role-card card p-3 text-center" data-role="patient" onclick="selectRole('patient')">
                                    <div class="role-icon-wrapper mb-2"><span class="role-icon">🧑</span></div>
                                    <div class="font-weight-bold text-dark">患者</div>
                                    <div class="text-sm text-muted">普通用户入口</div>
                                    <input type="radio" name="role" value="patient" class="d-none" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="role-card card p-3 text-center" data-role="doctor" onclick="selectRole('doctor')">
                                    <div class="role-icon-wrapper mb-2"><span class="role-icon">👩‍⚕️</span></div>
                                    <div class="font-weight-bold text-dark">医生</div>
                                    <div class="text-sm text-muted">管理员入口</div>
                                    <input type="radio" name="role" value="doctor" class="d-none" required>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 主治医师选择（患者注册时显示） -->
                    <div id="patient_info" style="display: none;">
                        <div class="mb-3">
                            <label for="doctor_id" class="form-label">
                                <i class="bi bi-stethoscope"></i> 选择主治医师
                            </label>
                            <select class="form-control" id="doctor_id" name="doctor_id" required>
                                <option value="">请选择主治医师</option>
                                {% for doctor in doctors %}
                                <option value="{{ doctor.id }}">
                                    {{ doctor.username }} - {{ doctor.doctor_title }} - {{ doctor.hospital }}
                                </option>
                                {% endfor %}
                            </select>
                            {% if not doctors %}
                            <small class="text-warning">暂无医生，请先注册医生账户</small>
                            {% endif %}
                        </div>
                    </div>
                    
                    <!-- 医生信息（默认隐藏） -->
                    <div id="doctor_info" style="display: none;">
                        <div class="mb-3">
                            <label for="doctor_title" class="form-label">医生职称</label>
                            <input type="text" class="form-control" id="doctor_title" name="doctor_title" placeholder="如：主任医师">
                        </div>
                        <div class="mb-3">
                            <label for="hospital" class="form-label">所属医院</label>
                            <input type="text" class="form-control" id="hospital" name="hospital" placeholder="请输入医院名称">
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 py-3">
                        <i class="bi bi-person-plus"></i> 立即注册
                    </button>
                </form>
                <hr class="my-4">
                <div class="text-center">
                    <p class="mb-2">已有账户？ <a href="/login" style="color: var(--pink-dark);">用户登录</a></p>
                    <p class="mb-0">医生请 <a href="/admin/login" style="color: #dc3545;">点击这里登录</a></p>
                </div>
            </div>
        </div>
        
        <!-- 装饰元素 -->
        <div class="text-center mt-4">
            <span style="font-size: 1.5rem; margin: 0 10px;">🌸</span>
            <span style="font-size: 1.5rem; margin: 0 10px;">💗</span>
            <span style="font-size: 1.5rem; margin: 0 10px;">🌸</span>
        </div>
    </div>
</div>

<script>
// 选择身份
function selectRole(role) {
    // 移除所有选中状态
    document.querySelectorAll('.role-card').forEach(card => {
        card.classList.remove('selected');
    });
    
    // 添加选中状态
    const selectedCard = document.querySelector(`[data-role="${role}"]`);
    if (selectedCard) {
        selectedCard.classList.add('selected');
    }
    
    // 选中对应的radio
    const radio = document.querySelector(`input[name="role"][value="${role}"]`);
    if (radio) {
        radio.checked = true;
    }
    
    // 显示/隐藏医生信息和患者信息
    const doctorInfo = document.getElementById('doctor_info');
    const patientInfo = document.getElementById('patient_info');
    
    if (role === 'doctor') {
        doctorInfo.style.display = 'block';
        patientInfo.style.display = 'none';
    } else {
        doctorInfo.style.display = 'none';
        patientInfo.style.display = 'block';
    }
}
</script>
{% endblock %}
