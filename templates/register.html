{% extends "base.html" %}

{% block title %}注册 - 乳腺癌辅助诊断系统{% endblock %}

{% block content %}
<style>
    .bow-hover {
        display: inline-block;
        cursor: pointer;
        transition: transform 0.3s ease;
    }
    
    .bow-hover:hover {
        animation: bowShake 0.5s ease-in-out;
        transform: scale(1.1);
    }
    
    @keyframes bowShake {
        0%, 100% { transform: scale(1.1) rotate(0deg); }
        10% { transform: scale(1.1) rotate(-10deg); }
        20% { transform: scale(1.1) rotate(10deg); }
        30% { transform: scale(1.1) rotate(-8deg); }
        40% { transform: scale(1.1) rotate(8deg); }
        50% { transform: scale(1.1) rotate(-5deg); }
        60% { transform: scale(1.1) rotate(5deg); }
        70% { transform: scale(1.1) rotate(-3deg); }
        80% { transform: scale(1.1) rotate(3deg); }
        90% { transform: scale(1.1) rotate(-1deg); }
    }
</style>
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5">
        <div class="card overflow-hidden">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <div class="mb-3">
                        <span class="bow-hover" style="font-size: 4rem;">💝</span>
                    </div>
                    <h4 class="text-dark mb-2">用户注册</h4>
                    <p class="text-muted">创建新账户开始使用</p>
                </div>
                {% if error %}
                <div class="alert alert-danger" role="alert">
                    <i class="bi bi-exclamation-circle"></i> {{ error }}
                </div>
                {% endif %}
                <form method="POST" action="/register">
                    <div class="mb-3">
                        <label for="username" class="form-label">
                            <i class="bi bi-person"></i> 用户名
                        </label>
                        <input type="text" class="form-control" id="username" name="username" placeholder="请输入用户名" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">
                            <i class="bi bi-lock"></i> 密码（6位）
                        </label>
                        <input type="password" class="form-control" id="password" name="password" placeholder="请输入6位密码" required minlength="6" maxlength="6">
                    </div>
                    <div class="mb-3">
                        <label for="confirm_password" class="form-label">
                            <i class="bi bi-lock-fill"></i> 确认密码（6位）
                        </label>
                        <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="请再次输入6位密码" required minlength="6" maxlength="6">
                    </div>
                    
                    <!-- 医生选项 -->
                    <div class="mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="is_doctor" name="is_doctor">
                            <label class="form-check-label" for="is_doctor">
                                <i class="bi bi-patch-check"></i> 我是医生
                            </label>
                        </div>
                    </div>
                    
                    <!-- 医生信息（默认隐藏） -->
                    <div id="doctor_info" style="display: none;">
                        <div class="mb-3">
                            <label for="doctor_title" class="form-label">医生职称</label>
                            <input type="text" class="form-control" id="doctor_title" name="doctor_title" placeholder="如：主任医师">
                        </div>
                        <div class="mb-3">
                            <label for="hospital" class="form-label">所属医院</label>
                            <input type="text" class="form-control" id="hospital" name="hospital" placeholder="请输入医院名称">
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 py-3">
                        <i class="bi bi-person-plus"></i> 立即注册
                    </button>
                </form>
                <hr class="my-4">
                <div class="text-center">
                    <p class="mb-0">已有账户？ <a href="/login" style="color: var(--pink-dark);">立即登录</a></p>
                </div>
            </div>
        </div>
        
        <!-- 装饰元素 -->
        <div class="text-center mt-4">
            <span style="font-size: 1.5rem; margin: 0 10px;">🌸</span>
            <span style="font-size: 1.5rem; margin: 0 10px;">💗</span>
            <span style="font-size: 1.5rem; margin: 0 10px;">🌸</span>
        </div>
    </div>
</div>

<script>
// 切换医生信息显示
document.getElementById('is_doctor').addEventListener('change', function() {
    const doctorInfo = document.getElementById('doctor_info');
    if (this.checked) {
        doctorInfo.style.display = 'block';
    } else {
        doctorInfo.style.display = 'none';
    }
});
</script>
{% endblock %}
