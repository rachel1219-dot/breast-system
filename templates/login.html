{% extends "base.html" %}

{% block title %}登录 - 乳腺癌辅助诊断系统{% endblock %}

{% block content %}
<style>
    .bow-hover {
        display: inline-block;
        cursor: pointer;
        transition: transform 0.3s ease;
    }
    
    .bow-hover:hover {
        animation: bowShake 0.5s ease-in-out;
        transform: scale(1.1);
    }
    
    @keyframes bowShake {
        0%, 100% { transform: scale(1.1) rotate(0deg); }
        10% { transform: scale(1.1) rotate(-10deg); }
        20% { transform: scale(1.1) rotate(10deg); }
        30% { transform: scale(1.1) rotate(-8deg); }
        40% { transform: scale(1.1) rotate(8deg); }
        50% { transform: scale(1.1) rotate(-5deg); }
        60% { transform: scale(1.1) rotate(5deg); }
        70% { transform: scale(1.1) rotate(-3deg); }
        80% { transform: scale(1.1) rotate(3deg); }
        90% { transform: scale(1.1) rotate(-1deg); }
    }
    
    .btn-login {
        border-radius: 25px !important;
        padding: 12px 24px !important;
        font-weight: 500;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
    }
    
    .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
    }
</style>
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5">
        <div class="card overflow-hidden">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <div class="mb-3">
                        <span class="bow-hover" style="font-size: 4rem;">🎀</span>
                    </div>
                    <h4 class="text-dark mb-2">用户登录</h4>
                    <p class="text-muted">欢迎回来，请登录您的账户</p>
                </div>
                {% if error %}
                <div class="alert alert-danger" role="alert">
                    <i class="bi bi-exclamation-circle"></i> {{ error }}
                </div>
                {% endif %}
                <form method="POST" action="/login">
                    <div class="mb-3">
                        <label for="username" class="form-label">
                            <i class="bi bi-person"></i> 用户名
                        </label>
                        <input type="text" class="form-control" id="username" name="username" placeholder="请输入用户名" required>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">
                            <i class="bi bi-lock"></i> 密码
                        </label>
                        <input type="password" class="form-control" id="password" name="password" placeholder="请输入密码" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-3 btn-login">
                        <i class="bi bi-box-arrow-in-right"></i> 立即登录
                    </button>
                </form>
                <hr class="my-4">
                <div class="text-center">
                    <p class="mb-2">还没有账户？ <a href="/register" style="color: var(--pink-dark);">立即注册</a></p>
                    <p class="mb-0">管理员请 <a href="/admin/login" style="color: #dc3545;">点击这里登录</a></p>
                </div>
            </div>
        </div>
        
        <!-- 装饰元素 -->
        <div class="text-center mt-4">
            <span style="font-size: 1.5rem; margin: 0 10px;">🌸</span>
            <span style="font-size: 1.5rem; margin: 0 10px;">💗</span>
            <span style="font-size: 1.5rem; margin: 0 10px;">🌸</span>
        </div>
    </div>
</div>
{% endblock %}
